app = "fast-maze-battle"
primary_region = "nrt"

[build]
  dockerfile = "Dockerfile"
  [build.args]

[env]
  PORT = "2567"

[http_service]
  internal_port = 2567
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
